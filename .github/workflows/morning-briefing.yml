name: Morning Briefing

on:
  workflow_dispatch:
  schedule:
    # GitHub cron runs in UTC. 05:00 UTC approximates 07:00 Europe/Berlin during summer time.
    - cron: "0 5 * * 1-5"

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Berlin
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Collect sources
        run: python -m src.collect_sources --config config/sources.yml --output outputs/collected-sources.json --hours 24

      - name: Generate briefing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.openAiAPI }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: python -m src.generate_briefing --input outputs/collected-sources.json --prompt prompts/morning_briefing_prompt.md --output-dir outputs

      - name: Upload briefing artifact
        uses: actions/upload-artifact@v4
        with:
          name: morning-briefing-${{ github.run_id }}
          path: |
            outputs/morning-briefing-*.md
            outputs/collected-sources.json
          if-no-files-found: error
          retention-days: 14
