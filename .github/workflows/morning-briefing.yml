name: Morning Briefing

on:
  workflow_dispatch:
  schedule:
    # GitHub cron runs in UTC. 05:00 UTC approximates 07:00 Europe/Berlin during summer time.
    - cron: "0 5 * * 1-5"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Collect sources
        run: python -m src.collect_sources --config config/sources.yml --output outputs/collected-sources.json --hours 24

      - name: Generate briefing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: python -m src.generate_briefing --input outputs/collected-sources.json --prompt prompts/morning_briefing_prompt.md --output-dir outputs

      - name: Send email
        if: ${{ vars.SEND_EMAIL == 'true' }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_SUBJECT: ${{ vars.SMTP_SUBJECT }}
        run: python -m src.send_email "outputs/morning-briefing-$(date +%F).md"

      - name: Commit generated briefing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git diff --cached --quiet || git commit -m "Add morning briefing $(date +%F)"
          git push
